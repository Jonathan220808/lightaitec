<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关系游戏</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #FFF8F2;
      --card:      #FFFDF9;
      --accent:    #C4735A;
      --accent-dk: #9A4A30;
      --soft:      #F5E6DC;
      --text:      #1C1008;
      --muted:     #9A7A68;
      --ease:      cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 110% 45% at 50% 0%, rgba(196,115,90,.16) 0%, transparent 68%),
        #FFF8F2;
      padding: 60px 24px 88px;
      color: var(--text);
    }

    /* ── 顶部装饰 ── */
    .header {
      text-align: center;
      margin-bottom: 56px;
      opacity: 0;
      animation: up .9s var(--ease) .06s forwards;
    }
    .header-ornament {
      display: block;
      font-size: 22px;
      color: var(--accent);
      opacity: .55;
      margin-bottom: 14px;
      letter-spacing: .4em;
    }
    .header h1 {
      font-family: 'Noto Serif SC','STSong',serif;
      font-size: 42px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: .06em;
      line-height: 1.15;
    }
    .header-line {
      width: 36px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      margin: 16px auto 14px;
      opacity: .65;
    }
    .header p {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: .04em;
    }

    /* ── 卡片列表 ── */
    .games {
      max-width: 460px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    a.card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--card);
      border-radius: 20px;
      padding: 24px 26px;
      border-left: 3.5px solid var(--accent);
      box-shadow: 0 4px 24px rgba(44,18,6,.08);
      text-decoration: none;
      color: inherit;
      transition: box-shadow .28s var(--ease), transform .22s var(--ease);
      opacity: 0;
    }
    a.card:nth-child(1){animation:up .72s var(--ease) .22s forwards;}
    a.card:nth-child(2){animation:up .72s var(--ease) .34s forwards;}
    a.card:nth-child(3){animation:up .72s var(--ease) .46s forwards;}
    a.card:hover { box-shadow:0 10px 40px rgba(196,115,90,.16); transform:translateY(-4px); }
    a.card:active{ transform:translateY(-2px); }

    .icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: var(--soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .info h2 {
      font-family: 'Noto Serif SC','STSong',serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
      letter-spacing: .02em;
    }
    .info p { font-size: 13px; color: var(--muted); line-height: 1.7; }

    .tag {
      display: inline-block;
      margin-top: 9px;
      font-size: 11px;
      padding: 3px 12px;
      border-radius: 100px;
      background: var(--soft);
      color: var(--accent);
      font-weight: 600;
      letter-spacing: .04em;
    }

    /* ── 底部说明 ── */
    .privacy {
      max-width: 460px;
      margin: 52px auto 0;
      text-align: center;
      font-size: 11px;
      color: #C5B0A5;
      line-height: 2;
      opacity: 0;
      animation: up .7s var(--ease) .62s forwards;
    }
    .dot {
      display: inline-block;
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 5px;
      opacity: .4;
      position: relative; top: -1px;
    }

    @keyframes up {
      from { opacity:0; transform:translateY(26px); }
      to   { opacity:1; transform:translateY(0);    }
    }
    @media (prefers-reduced-motion:reduce){
      *{animation:none!important;opacity:1!important;}
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-ornament">· · ·</span>
    <h1>关系游戏</h1>
    <div class="header-line"></div>
    <p>帮助彼此更了解的互动游戏</p>
  </div>

  <div class="games">

    <a class="card" href="./chat/">
      <div class="icon">💬</div>
      <div class="info">
        <h2>心灵奇旅</h2>
        <p>按深度抽取话题，从轻松到深入，让对话自然流动。</p>
        <span class="tag">1–2人 · 话题抽取</span>
      </div>
    </a>

    <a class="card" href="./feeling/">
      <div class="icon">🎭</div>
      <div class="info">
        <h2>情绪特工队</h2>
        <p>玩家 A 选一个情绪，玩家 B 猜——看你们是否心有灵犀。</p>
        <span class="tag">2人 · 情绪共鸣</span>
      </div>
    </a>

    <a class="card" href="./flip/">
      <div class="icon">🃏</div>
      <div class="info">
        <h2>翻出真心</h2>
        <p>每人选 2 张卡牌，看看彼此内心深处的共同点。</p>
        <span class="tag">2–4人 · 自我探索</span>
      </div>
    </a>

  </div>

  <div class="privacy">
    <span class="dot"></span>本页不收集任何数据，所有游戏均在你的设备本地运行。
  </div>

</body>
</html>
