<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关系游戏</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #E8E3DB;
      --card:  #FFFFFF;
      --text:  #1A1108;
      --muted: #8A8078;
      --tag:   #DEDAD3;
      --ease:  cubic-bezier(0.16, 1, 0.3, 1);

      /* 每个游戏的专属色 */
      --c1: #5E8CB5;   /* 心灵奇旅 · 石板蓝   */
      --c2: #B46880;   /* 情绪特工队 · 玫瑰粉 */
      --c3: #5D8F72;   /* 翻出真心 · 鼠尾草绿 */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 72px 24px 96px;
      color: var(--text);
    }

    .container { max-width: 720px; margin: 0 auto; }

    /* ── 标题区 ── */
    .header {
      margin-bottom: 52px;
      opacity: 0;
      animation: up .9s var(--ease) 0s forwards;
    }
    .header-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .header h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 46px;
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: -.01em;
      color: var(--text);
    }
    .header h1 span {
      display: block;
      font-weight: 400;
      color: var(--muted);
      font-size: 40px;
    }

    /* ── 游戏卡片 ── */
    .games {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    a.game-card {
      display: flex;
      align-items: stretch;
      background: var(--card);
      border-radius: 24px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      min-height: 210px;
      box-shadow: 0 2px 20px rgba(0,0,0,.07);
      opacity: 0;
      transition: transform .28s var(--ease), box-shadow .28s var(--ease);
    }
    a.game-card:nth-child(1) { animation: up .72s var(--ease) .12s forwards; }
    a.game-card:nth-child(2) { animation: up .72s var(--ease) .22s forwards; }
    a.game-card:nth-child(3) { animation: up .72s var(--ease) .32s forwards; }
    a.game-card:hover  { transform: translateY(-5px); box-shadow: 0 18px 48px rgba(0,0,0,.12); }
    a.game-card:active { transform: translateY(-2px); }

    /* ── 左侧文字 ── */
    .card-text {
      flex: 1;
      padding: 40px 38px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .card-text h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: .01em;
      color: var(--text);
      margin-bottom: 10px;
    }
    .card-text p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.85;
      margin-bottom: 22px;
    }
    .card-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      padding: 5px 14px;
      border-radius: 100px;
      background: var(--tag);
      color: var(--muted);
      align-self: flex-start;
    }

    /* ── 右侧色块 ── */
    .card-visual {
      width: 270px;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-visual.v1 { background: var(--c1); }
    .card-visual.v2 { background: var(--c2); }
    .card-visual.v3 { background: var(--c3); }

    /* 背景装饰圆 */
    .card-visual::before {
      content: '';
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 40px solid rgba(255,255,255,.08);
      top: 50%;
      left: 60%;
      transform: translate(-50%, -50%);
    }
    .card-visual::after {
      content: '';
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 24px solid rgba(255,255,255,.06);
      bottom: -30px;
      left: -30px;
    }

    .visual-num {
      font-family: 'Noto Serif SC', serif;
      font-size: 128px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -.04em;
      color: rgba(255,255,255,.22);
      position: relative;
      z-index: 1;
      user-select: none;
    }

    /* ── 底部注释 ── */
    .footer {
      margin-top: 56px;
      text-align: center;
      font-size: 11px;
      color: #B4ADA5;
      letter-spacing: .03em;
      opacity: 0;
      animation: up .6s var(--ease) .5s forwards;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── 移动端 ── */
    @media (max-width: 580px) {
      body { padding: 52px 16px 80px; }
      .header h1      { font-size: 36px; }
      .header h1 span { font-size: 30px; }
      a.game-card     { flex-direction: column; min-height: auto; }
      .card-visual    { width: 100%; height: 150px; }
      .visual-num     { font-size: 88px; }
      .card-text      { padding: 28px 24px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; opacity: 1 !important; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <p class="header-label">互动小游戏</p>
      <h1>关系游戏<span>让彼此更了解。</span></h1>
    </div>

    <div class="games">

      <a class="game-card" href="./chat/">
        <div class="card-text">
          <span class="card-num">01</span>
          <h2>心灵奇旅</h2>
          <p>按深度抽取话题，从轻松到深入，让对话自然流动。</p>
          <span class="card-tag">1–2人 · 话题抽取</span>
        </div>
        <div class="card-visual v1">
          <span class="visual-num">01</span>
        </div>
      </a>

      <a class="game-card" href="./feeling/">
        <div class="card-text">
          <span class="card-num">02</span>
          <h2>情绪特工队</h2>
          <p>玩家 A 选一个情绪，玩家 B 猜——看你们是否心有灵犀。</p>
          <span class="card-tag">2人 · 情绪共鸣</span>
        </div>
        <div class="card-visual v2">
          <span class="visual-num">02</span>
        </div>
      </a>

      <a class="game-card" href="./flip/">
        <div class="card-text">
          <span class="card-num">03</span>
          <h2>翻出真心</h2>
          <p>每人选 2 张卡牌，看看彼此内心深处的共同点。</p>
          <span class="card-tag">2–4人 · 自我探索</span>
        </div>
        <div class="card-visual v3">
          <span class="visual-num">03</span>
        </div>
      </a>

    </div>

    <p class="footer">本页不收集任何数据，所有游戏均在你的设备本地运行。</p>

  </div>
</body>
</html>
