<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>需求押注</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #FDF8F2;
      --card:     #FFFFFF;
      --accent:   #B8864E;
      --accent-dk:#8B6030;
      --soft:     #F5E8D4;
      --text:     #1C1008;
      --muted:    #9A8070;
      --ease:     cubic-bezier(0.16,1,0.3,1);
      --pA:       #C4735A;
      --pB:       #5B7FA6;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
      background:
        radial-gradient(ellipse 110% 40% at 50% 0%, rgba(184,134,78,.12) 0%, transparent 65%),
        var(--bg);
      min-height:100vh; color:var(--text); overflow-x:hidden;
    }
    .screen { display:none; padding:28px 16px 60px; max-width:480px; margin:0 auto; }
    .screen.active { display:block; }

    .back {
      display:inline-flex; align-items:center; gap:6px;
      font-size:13px; color:var(--muted); text-decoration:none;
      margin-bottom:24px; transition:color .2s;
    }
    .back:hover { color:var(--accent); }

    .btn {
      width:100%; padding:16px; border-radius:14px; border:none;
      font-size:16px; font-weight:600; cursor:pointer;
      transition:.2s var(--ease); letter-spacing:.02em; font-family:inherit;
    }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent-dk); }
    .btn-primary:active { transform:scale(.98); }
    .btn-ghost {
      background:transparent; color:var(--muted);
      border:1.5px solid rgba(154,128,112,.3); font-size:14px; padding:12px;
    }
    .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
    .btn-disabled { opacity:.35; pointer-events:none; }

    .start-label {
      font-size:11px; font-weight:700; letter-spacing:.16em;
      text-transform:uppercase; color:var(--muted); margin-bottom:12px;
    }
    .start-title {
      font-family:'Noto Serif SC',serif; font-size:40px; font-weight:900;
      line-height:1.18; color:var(--text); margin-bottom:12px;
    }
    .start-desc { font-size:15px; color:var(--muted); line-height:1.8; margin-bottom:24px; }
    .mechanic-box {
      background:var(--card); border-radius:16px; padding:20px 24px;
      margin-bottom:32px; box-shadow:0 2px 16px rgba(0,0,0,.06);
    }
    .mechanic-item { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
    .mechanic-item:last-child { margin-bottom:0; }
    .mechanic-num {
      width:24px; height:24px; border-radius:50%; background:var(--soft); flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700; color:var(--accent); margin-top:1px;
    }
    .mechanic-text { font-size:14px; color:var(--text); line-height:1.6; }
    .mechanic-text em { font-style:normal; color:var(--accent); font-weight:600; }

    .progress-bar { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
    .progress-dots { display:flex; gap:6px; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--soft); transition:.3s; }
    .dot.done { background:var(--accent); }
    .dot.current { background:var(--accent); width:20px; border-radius:4px; }
    .progress-label { font-size:12px; color:var(--muted); }

    .scenario-badge {
      display:inline-block; font-size:11px; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase; color:var(--accent); background:var(--soft);
      padding:4px 14px; border-radius:100px; margin-bottom:20px;
    }
    .scenario-card {
      background:var(--card); border-radius:20px; padding:32px 28px;
      box-shadow:0 4px 24px rgba(0,0,0,.08); margin-bottom:28px;
      border-left:4px solid var(--accent);
    }
    .scenario-text {
      font-family:'Noto Serif SC',serif; font-size:20px; font-weight:700;
      line-height:1.7; color:var(--text);
    }

    .scenario-mini {
      font-size:13px; color:var(--muted); line-height:1.6;
      background:var(--soft); border-radius:10px; padding:12px 16px; margin-bottom:14px;
    }
    .player-tag {
      display:inline-flex; align-items:center; gap:8px;
      font-size:13px; font-weight:600; margin-bottom:10px;
    }
    .player-dot { width:10px; height:10px; border-radius:50%; }
    .hearts-counter {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--card); border-radius:12px; padding:12px 16px;
      box-shadow:0 2px 12px rgba(0,0,0,.06); margin-bottom:16px;
    }
    .hearts-label { font-size:13px; color:var(--muted); }
    .hearts-display { display:flex; gap:6px; }
    .heart-slot { font-size:20px; transition:.2s; }

    .needs-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px; }
    .need-card {
      background:var(--card); border-radius:14px; padding:14px 10px 12px;
      text-align:center; cursor:pointer; position:relative;
      box-shadow:0 2px 12px rgba(0,0,0,.06);
      border:2px solid transparent; transition:.18s var(--ease);
      user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
    }
    .need-card:active { transform:scale(.94); }
    .need-card.has-hearts { border-color:var(--accent); background:var(--soft); }
    .need-name {
      font-size:13px; font-weight:600; color:var(--text); line-height:1.4;
      margin-bottom:8px; min-height:36px;
      display:flex; align-items:center; justify-content:center;
    }
    .need-hearts-row {
      display:flex; align-items:center; justify-content:center; gap:6px; min-height:28px;
    }
    .refresh-btn {
      position:absolute; top:5px; right:5px; width:20px; height:20px; border-radius:50%;
      background:rgba(154,128,112,.15); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:11px; color:var(--muted); transition:.15s; padding:0; line-height:1;
      font-family:inherit;
    }
    .refresh-btn:hover { background:var(--soft); color:var(--accent); }
    .remove-heart {
      width:26px; height:26px; border-radius:50%; flex-shrink:0;
      background:rgba(154,128,112,.18); border:none; cursor:pointer;
      font-size:15px; color:var(--muted);
      display:flex; align-items:center; justify-content:center;
      transition:.15s; font-family:inherit; padding:0; line-height:1;
    }
    .remove-heart:hover { background:var(--soft); color:var(--accent); }

    .handoff-wrap {
      min-height:calc(100vh - 88px); display:flex; flex-direction:column;
      align-items:center; justify-content:center; text-align:center;
    }
    .handoff-icon { font-size:72px; margin-bottom:28px; }
    .handoff-title {
      font-family:'Noto Serif SC',serif; font-size:26px; font-weight:900;
      color:var(--text); margin-bottom:10px;
    }
    .handoff-sub { font-size:15px; color:var(--muted); margin-bottom:44px; line-height:1.8; }
    .handoff-sub strong { color:var(--text); }

    .reveal-title {
      font-family:'Noto Serif SC',serif; font-size:22px; font-weight:900;
      color:var(--text); margin-bottom:10px;
    }
    .legend { display:flex; gap:20px; margin-bottom:18px; }
    .legend-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); }
    .legend-dot { width:10px; height:10px; border-radius:50%; }
    .reveal-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
    .reveal-card {
      background:var(--card); border-radius:14px; padding:14px 10px 12px;
      text-align:center; box-shadow:0 2px 12px rgba(0,0,0,.06);
      border:2px solid transparent;
    }
    .reveal-card.diff { border-color:var(--accent); }
    .r-name {
      font-size:12px; font-weight:600; color:var(--text); margin-bottom:10px;
      min-height:30px; display:flex; align-items:center; justify-content:center;
      line-height:1.3;
    }
    .r-row { display:flex; justify-content:center; gap:2px; min-height:18px; margin-bottom:2px; }
    .r-heart   { font-size:13px; }
    .r-heart.a { color:var(--pA); }
    .r-heart.b { color:var(--pB); }
    .r-empty   { font-size:13px; opacity:.2; }
    .reveal-prompt {
      background:var(--card); border-radius:16px; padding:20px 24px;
      box-shadow:0 2px 16px rgba(0,0,0,.06); margin-bottom:24px;
    }
    .reveal-prompt p { font-size:15px; color:var(--muted); line-height:1.8; text-align:center; }
    .reveal-prompt strong { color:var(--text); }
    .btn-row { display:flex; flex-direction:column; gap:10px; }

    .end-wrap { text-align:center; padding:48px 0 0; }
    .end-emoji { font-size:68px; margin-bottom:24px; }
    .end-title {
      font-family:'Noto Serif SC',serif; font-size:28px; font-weight:900;
      color:var(--text); margin-bottom:12px;
    }
    .end-sub { font-size:15px; color:var(--muted); margin-bottom:44px; line-height:1.8; }
  </style>
</head>
<body>

<!-- ① 开始屏 -->
<div id="startScreen" class="screen active">
  <a href="../" class="back">← 所有游戏</a>
  <p class="start-label">互动游戏 · 04</p>
  <h1 class="start-title">需求<br>押注</h1>
  <p class="start-desc">一个场景，两份需求。看见彼此真正需要什么。</p>
  <div class="mechanic-box">
    <div class="mechanic-item">
      <div class="mechanic-num">1</div>
      <div class="mechanic-text">场景出现，你有 <em>3颗心</em> 可以押</div>
    </div>
    <div class="mechanic-item">
      <div class="mechanic-num">2</div>
      <div class="mechanic-text">把心押在<em>你最需要的</em>卡上，可以全押一张，也可以分开押</div>
    </div>
    <div class="mechanic-item">
      <div class="mechanic-num">3</div>
      <div class="mechanic-text">递给对方，TA 也押好，然后<em>一起揭晓</em>对比</div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="startGame()">开始游戏</button>
</div>

<!-- ② 场景屏 -->
<div id="scenarioScreen" class="screen">
  <a href="#" class="back" onclick="goStart();return false;">← 重新开始</a>
  <div class="progress-bar">
    <div class="progress-dots" id="progressDots"></div>
    <span class="progress-label" id="progressLabel"></span>
  </div>
  <p class="scenario-badge">本轮场景</p>
  <div class="scenario-card">
    <p class="scenario-text" id="scenarioText"></p>
  </div>
  <button class="btn btn-ghost" style="margin-bottom:12px" onclick="changeScenario()">↻ 换一个场景</button>
  <button class="btn btn-primary" onclick="startBetA()">A 先来押注</button>
</div>

<!-- ③ 押注屏（A / B 共用） -->
<div id="betScreen" class="screen">
  <p class="scenario-mini" id="betScenarioMini"></p>
  <div class="player-tag" id="playerTag"></div>
  <div class="hearts-counter">
    <span class="hearts-label">还可押</span>
    <div class="hearts-display" id="heartsDisplay"></div>
  </div>
  <div class="needs-grid" id="needsGrid"></div>
  <button class="btn btn-ghost" style="margin-bottom:12px" onclick="refreshAllNeeds()">↻ 换一批需求</button>
  <button class="btn btn-primary btn-disabled" id="confirmBtn" onclick="confirmBet()">确认押注</button>
</div>

<!-- ④ 交接屏 -->
<div id="handoffScreen" class="screen">
  <div class="handoff-wrap">
    <div class="handoff-icon">🤝</div>
    <h2 class="handoff-title">A 押好了</h2>
    <p class="handoff-sub">请把手机<strong>递给对方</strong><br>不要让 A 偷看哦</p>
    <button class="btn btn-primary" style="max-width:280px" onclick="startBetB()">B 已准备好</button>
  </div>
</div>

<!-- ⑤ 揭晓屏 -->
<div id="revealScreen" class="screen">
  <p class="scenario-mini" id="revealScenario"></p>
  <h2 class="reveal-title">两人的需求</h2>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--pA)"></div><span>A 的心</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--pB)"></div><span>B 的心</span>
    </div>
  </div>
  <div class="reveal-grid" id="revealGrid"></div>
  <div class="reveal-prompt"><p id="revealPrompt"></p></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="nextBtn" onclick="nextRound()"></button>
    <a href="../" class="btn btn-ghost" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">回到首页</a>
  </div>
</div>

<!-- ⑥ 结束屏 -->
<div id="endScreen" class="screen">
  <div class="end-wrap">
    <div class="end-emoji">✨</div>
    <h2 class="end-title">结束了</h2>
    <p class="end-sub">你们了解了彼此<br>在不同场景下的需求<br>这些不同，就是可以聊的。</p>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startGame()">再玩一次</button>
      <a href="../" class="btn btn-ghost" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">回到首页</a>
    </div>
  </div>
</div>

<script>
const TOTAL_HEARTS   = 3;
const ROUNDS_PER_GAME = 5;

const needsPool = [
  "被听见","被理解","被认可","被记住细节","被夸","被接住情绪",
  "被陪伴","靠近一点","一起待着不说话","被主动找","被照顾","被问还好吗",
  "自由空间","不被催","被信任","共同决定","不被打扰","帮我拿主意",
  "被鼓励","被保护","被需要","被特别在意","被看见努力","被安慰",
  "不用解释","被主动联系","先冷静一下","有空间和时间","被尊重选择",
  "说出来就好","一起面对","知道你在这里","只是陪着我","想一个人消化","被心疼"
];

const scenarios = [
  { text:"你今天被人误解了，心里很委屈，对方却不知道",       defaults:["被听见","被接住情绪","被认可","不用解释","被安慰","被主动找"] },
  { text:"你和某个人产生了误会，还没解开",                    defaults:["被主动联系","不被催","自由空间","被认可","被主动找","被信任"] },
  { text:"你一个人扛了很久，其实已经很累了",                 defaults:["被照顾","被看见努力","一起待着不说话","不用解释","被问还好吗","被心疼"] },
  { text:"你有件心事想说，但不确定对方愿不愿意听",           defaults:["被听见","被理解","被鼓励","被认可","知道你在这里","被心疼"] },
  { text:"对方最近很忙，你们见面变少了",                     defaults:["被主动找","被陪伴","被记住细节","被信任","被需要","被特别在意"] },
  { text:"你搞砸了一件事，有点自责",                         defaults:["被鼓励","被接住情绪","被认可","一起面对","不被催","被心疼"] },
  { text:"你需要做一个重要决定，很迷茫",                     defaults:["被听见","帮我拿主意","共同决定","被信任","被理解","知道你在这里"] },
  { text:"你今天特别开心，想和人分享",                       defaults:["被听见","被夸","被需要","被特别在意","被陪伴","被主动找"] },
  { text:"你感觉对方不太理解你最近的状态",                   defaults:["被理解","被接住情绪","被看见努力","不用解释","被问还好吗","被认可"] },
  { text:"你在外面撑了一整天，终于回家了",                   defaults:["被陪伴","一起待着不说话","被照顾","不被打扰","被安慰","只是陪着我"] },
  { text:"你和某个人最近，感觉少了点什么",                    defaults:["被主动找","被记住细节","被需要","被特别在意","一起面对","被听见"] },
  { text:"你最近压力很大，但一直没有提",                     defaults:["被问还好吗","被接住情绪","被心疼","被陪伴","只是陪着我","不用解释"] },
  { text:"你发现对方好像有什么事没有跟你说",                 defaults:["被信任","共同决定","被认可","被听见","一起面对","不被催"] },
  { text:"你付出了很多，但感觉没被看见",                      defaults:["被看见努力","被认可","被特别在意","被记住细节","被夸","被需要"] },
  { text:"你们计划了很久的事情，突然变了",                   defaults:["被主动联系","被认可","共同决定","被信任","不被催","被听见"] },
  { text:"你身体不舒服，但还是在硬撑",                       defaults:["被照顾","被问还好吗","被心疼","被安慰","只是陪着我","被主动找"] },
  { text:"你有一个想法，但怕被否定，还没说出口",             defaults:["被鼓励","被理解","被接住情绪","被认可","被信任","不被催"] },
  { text:"你感觉最近的自己很难相处，不知道怎么解释",         defaults:["被接住情绪","不用解释","被理解","被认可","只是陪着我","知道你在这里"] },
  { text:"你想单独待一会儿，但又怕对方误会",                 defaults:["自由空间","被理解","不被催","被信任","有空间和时间","被尊重选择"] },
  { text:"对方说了一句话让你有点受伤，但你没有表现出来",     defaults:["被接住情绪","被认可","被主动联系","被理解","被听见","被心疼"] },
  { text:"你们很久没有深聊了",                               defaults:["被听见","被理解","被需要","被特别在意","被陪伴","被主动找"] },
  { text:"你在某件事上很努力，但结果不如预期",               defaults:["被看见努力","被鼓励","被接住情绪","被认可","一起面对","被心疼"] },
  { text:"你最近有很多情绪，不知道从哪里说起",               defaults:["被听见","被接住情绪","只是陪着我","不被催","知道你在这里","被理解"] },
  { text:"你最近总是先迈出那一步，有点疲惫了",                defaults:["被看见努力","被特别在意","被需要","被认可","被安慰","被主动联系"] },
  { text:"今天发生了一件让你很触动的事",                     defaults:["被听见","被理解","被陪伴","被特别在意","被主动找","知道你在这里"] }
];

let selectedScenarios = [];
let currentRound      = 0;
let currentNeeds      = [];
let needsAfterA       = [];
let heartA = {};
let heartB = {};
let heartsLeftA = TOTAL_HEARTS;
let heartsLeftB = TOTAL_HEARTS;
let isPhaseA    = true;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function goStart() { showScreen('startScreen'); }

function startGame() {
  selectedScenarios = shuffle(scenarios).slice(0, ROUNDS_PER_GAME);
  currentRound = 0;
  showScenario();
}

function showScenario() {
  const dotsEl = document.getElementById('progressDots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < ROUNDS_PER_GAME; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentRound ? ' done' : i === currentRound ? ' current' : '');
    dotsEl.appendChild(d);
  }
  document.getElementById('progressLabel').textContent = `第 ${currentRound + 1} / ${ROUNDS_PER_GAME} 轮`;
  document.getElementById('scenarioText').textContent = selectedScenarios[currentRound].text;
  showScreen('scenarioScreen');
}

function changeScenario() {
  const usedTexts = new Set(selectedScenarios.map(s => s.text));
  const available = scenarios.filter(s => !usedTexts.has(s.text));
  if (!available.length) return;
  const pick = available[Math.floor(Math.random() * available.length)];
  selectedScenarios[currentRound] = pick;
  showScenario();
}

function startBetA() {
  isPhaseA = true;
  heartA = {};
  heartsLeftA = TOTAL_HEARTS;
  currentNeeds = [...selectedScenarios[currentRound].defaults];
  renderBet();
  showScreen('betScreen');
}

function startBetB() {
  isPhaseA = false;
  heartB = {};
  heartsLeftB = TOTAL_HEARTS;
  currentNeeds = [...selectedScenarios[currentRound].defaults];
  renderBet();
  showScreen('betScreen');
}

function renderBet() {
  const hearts     = isPhaseA ? heartA : heartB;
  const heartsLeft = isPhaseA ? heartsLeftA : heartsLeftB;
  const color      = isPhaseA ? 'var(--pA)' : 'var(--pB)';
  const label      = isPhaseA ? 'A' : 'B';

  document.getElementById('betScenarioMini').textContent = selectedScenarios[currentRound].text;

  document.getElementById('playerTag').innerHTML =
    `<div class="player-dot" style="background:${color}"></div>
     <span style="color:${color}">${label} 的需求</span>`;

  const hEl = document.getElementById('heartsDisplay');
  hEl.innerHTML = '';
  const spent = TOTAL_HEARTS - heartsLeft;
  for (let i = 0; i < TOTAL_HEARTS; i++) {
    const h = document.createElement('span');
    h.className = 'heart-slot';
    h.textContent = '❤';
    h.style.color = i < spent ? color : 'rgba(154,128,112,.25)';
    hEl.appendChild(h);
  }

  const grid = document.getElementById('needsGrid');
  grid.innerHTML = '';
  currentNeeds.forEach((need, idx) => {
    const count = hearts[need] || 0;
    const card  = document.createElement('div');
    card.className = 'need-card' + (count > 0 ? ' has-hearts' : '');

    card.innerHTML =
      `<button class="refresh-btn" onclick="refreshOne(event,${idx})">↻</button>
       <div class="need-name">${need}</div>
       <div class="need-hearts-row">
         ${count > 0 ? `<span style="color:${color};font-size:16px;letter-spacing:2px">${'❤'.repeat(count)}</span>` : ''}
         ${count > 0 ? '<button class="remove-heart">−</button>' : ''}
       </div>`;

    if (count > 0) {
      card.querySelector('.remove-heart').addEventListener('click', (e) => {
        e.stopPropagation();
        removeHeart(e, need);
      });
    }

    card.addEventListener('click', () => addHeart(need));
    grid.appendChild(card);
  });

  document.getElementById('confirmBtn').classList.toggle('btn-disabled', heartsLeft > 0);
}

function addHeart(needName) {
  const left = isPhaseA ? heartsLeftA : heartsLeftB;
  if (left <= 0) return; // 没有剩余心：先点减号释放，再来加
  const hearts = isPhaseA ? heartA : heartB;
  hearts[needName] = (hearts[needName] || 0) + 1;
  if (isPhaseA) heartsLeftA--; else heartsLeftB--;
  renderBet();
}

function removeHeart(e, needName) {
  e.stopPropagation();
  const hearts = isPhaseA ? heartA : heartB;
  if (!hearts[needName]) return;
  hearts[needName]--;
  if (hearts[needName] === 0) delete hearts[needName];
  if (isPhaseA) heartsLeftA++; else heartsLeftB++;
  renderBet();
}

function refreshOne(e, idx) {
  e.stopPropagation();
  const available = needsPool.filter(n => !currentNeeds.includes(n));
  if (!available.length) return;
  const pick = available[Math.floor(Math.random() * available.length)];
  const hearts = isPhaseA ? heartA : heartB;
  const old = currentNeeds[idx];
  if (hearts[old]) {
    const ret = hearts[old];
    delete hearts[old];
    if (isPhaseA) heartsLeftA += ret; else heartsLeftB += ret;
  }
  currentNeeds[idx] = pick;
  renderBet();
}

function refreshAllNeeds() {
  if (isPhaseA) { heartA = {}; heartsLeftA = TOTAL_HEARTS; }
  else          { heartB = {}; heartsLeftB = TOTAL_HEARTS; }
  currentNeeds = shuffle(needsPool).slice(0, 6);
  renderBet();
}

function confirmBet() {
  if (isPhaseA) {
    needsAfterA = [...currentNeeds];
    showScreen('handoffScreen');
  } else {
    showReveal();
  }
}

function showReveal() {
  document.getElementById('revealScenario').textContent = selectedScenarios[currentRound].text;

  const needsAfterB = [...currentNeeds];
  const bExtras = needsAfterB.filter(n => (heartB[n] || 0) > 0 && !needsAfterA.includes(n));
  // 最多展示6张，优先保留有心的卡
  const displayNeeds = [...needsAfterA, ...bExtras].slice(0, 6);

  const grid = document.getElementById('revealGrid');
  grid.innerHTML = '';

  displayNeeds.forEach(need => {
    const aCount = heartA[need] || 0;
    const bCount = heartB[need] || 0;
    const isDiff  = aCount !== bCount;

    const card = document.createElement('div');
    card.className = 'reveal-card' + (isDiff ? ' diff' : '');

    const mkHearts = (count, cls) => {
      let h = '';
      for (let i = 0; i < TOTAL_HEARTS; i++) {
        h += i < count
          ? `<span class="r-heart ${cls}">❤</span>`
          : `<span class="r-empty">♡</span>`;
      }
      return h;
    };

    card.innerHTML =
      `<div class="r-name">${need}</div>
       <div class="r-row">${mkHearts(aCount, 'a')}</div>
       <div class="r-row">${mkHearts(bCount, 'b')}</div>`;
    grid.appendChild(card);
  });

  const diffs = displayNeeds.filter(n => (heartA[n]||0) !== (heartB[n]||0));
  const promptEl = document.getElementById('revealPrompt');
  if (diffs.length === 0) {
    promptEl.innerHTML = '<p>你们这轮需求完全一样 ❤<br><strong>聊聊这些对你们为什么都这么重要？</strong></p>';
  } else {
    const biggest = diffs.reduce((max, n) =>
      Math.abs((heartA[n]||0)-(heartB[n]||0)) > Math.abs((heartA[max]||0)-(heartB[max]||0)) ? n : max
    , diffs[0]);
    promptEl.innerHTML =
      `<p>你们在 <strong>「${biggest}」</strong> 上差别最大。<br>聊聊这个时刻你们各自需要的是什么？</p>`;
  }

  document.getElementById('nextBtn').textContent =
    currentRound < ROUNDS_PER_GAME - 1 ? '下一个场景 →' : '结束游戏';

  showScreen('revealScreen');
}

function nextRound() {
  currentRound++;
  if (currentRound >= ROUNDS_PER_GAME) {
    showScreen('endScreen');
  } else {
    showScenario();
  }
}
</script>
