<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵奇旅</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #FFF8F2;
            --card:     #FFFDF9;
            --accent:   #C4735A;
            --accent-dk:#8B3E27;
            --soft:     #F5E6DC;
            --text:     #1C1008;
            --muted:    #9A7A68;
            --ease:     cubic-bezier(0.16,1,0.3,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
            background:
                radial-gradient(ellipse 110% 45% at 50% 0%, rgba(196,115,90,.14) 0%, transparent 65%),
                var(--bg);
            min-height: 100vh;
            padding: 32px 20px 60px;
            color: var(--text);
        }

        /* ── 返回 ── */
        .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--muted);
            text-decoration: none;
            margin-bottom: 28px;
            transition: color .2s;
        }
        .back:hover { color: var(--accent); }

        .container { max-width: 560px; margin: 0 auto; }

        /* ── 标题区 ── */
        .title-area {
            text-align: center;
            margin-bottom: 40px;
        }
        .title-area h1 {
            font-family: 'Noto Serif SC','STSong',serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: .05em;
            margin-bottom: 8px;
        }
        .title-area p {
            font-size: 13px;
            color: var(--muted);
        }

        /* ── 难度选择按钮 ── */
        .diff-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 28px;
        }
        .diff-btn {
            padding: 16px 0;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform .18s var(--ease), box-shadow .18s var(--ease);
            letter-spacing: .04em;
            font-family: inherit;
        }
        .diff-btn:hover  { transform: translateY(-2px); box-shadow:0 6px 20px rgba(196,115,90,.22); }
        .diff-btn:active { transform: translateY(0); }

        .easy   { background: var(--soft); color: var(--accent-dk); }
        .middle { background: var(--accent); color: #fff; }
        .hard   { background: var(--accent-dk); color: #fff; }

        /* ── 问题展示卡 ── */
        .question-card {
            background: var(--card);
            border-radius: 24px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 6px 32px rgba(44,18,6,.09);
            padding: 44px 36px;
            min-height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        .quote-mark {
            font-family: Georgia, serif;
            font-size: 64px;
            line-height: 1;
            color: var(--soft);
            position: absolute;
            top: 16px;
            left: 24px;
            user-select: none;
        }
        .question-text {
            font-size: 19px;
            color: var(--text);
            line-height: 2;
            font-weight: 400;
            position: relative;
            z-index: 1;
        }
        .question-text.placeholder {
            font-size: 15px;
            color: var(--muted);
        }

        /* ── 操作区 ── */
        .actions {
            margin-top: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .tip {
            font-size: 12px;
            color: var(--muted);
        }
        .reset-btn {
            font-size: 12px;
            color: var(--muted);
            background: var(--soft);
            border: none;
            border-radius: 100px;
            padding: 6px 16px;
            cursor: pointer;
            transition: background .2s, color .2s;
            font-family: inherit;
        }
        .reset-btn:hover { background: var(--accent); color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <a class="back" href="../">← 返回</a>

        <div class="title-area">
            <h1>心灵奇旅</h1>
            <p>从轻松到深入，让对话自然流动</p>
        </div>

        <div class="diff-row">
            <button class="diff-btn easy"   onclick="getQuestion('easy')">轻松</button>
            <button class="diff-btn middle" onclick="getQuestion('middle')">深入</button>
            <button class="diff-btn hard"   onclick="getQuestion('hard')">走心</button>
        </div>

        <div class="question-card">
            <span class="quote-mark">"</span>
            <div class="question-text placeholder" id="showQ">选择一个深度，抽取第一道题</div>
        </div>

        <div class="actions">
            <span class="tip">抽过的题不会重复出现</span>
            <button class="reset-btn" onclick="resetAll()">重置全部</button>
        </div>
    </div>

    <script>
        const questionList = {
            easy: [
                "你有没有一种食物，心情不好的时候一定要吃？",
                "你最近有没有一件特别小、但让你心情变好的事？",
                "如果今天什么都不用做，你最想怎么过这一天？",
                "你有没有一首歌，听到前奏就立刻有画面感？",
                "你最喜欢的天气是什么，喜欢它哪里？",
                "你有没有一个地方，每次去都莫名觉得心安？",
                "你平时一个人的时候最喜欢做什么？",
                "你有没有一种小习惯，自己觉得有点奇怪但改不掉？",
                "你有没有特别喜欢的一个季节，喜欢它的哪个瞬间？",
                "你更喜欢安静待在家，还是出去走走？",
                "你最近有没有一本书、一部剧或一首歌让你印象特别深？",
                "你喜欢早起还是晚睡，为什么？",
                "你有没有一种气味，闻到就会特别有安全感？",
                "如果可以什么都不带去一个地方待一周，你会选哪里？",
                "你觉得最近哪件小事让你觉得「生活还挺好的」？",
                "你有没有一个特别小的爱好，但很少有人知道？",
                "你一般怎么度过周末的早上？",
                "你更喜欢人多热闹，还是两三个人安静地待着？",
                "你有没有一个城市，去了就不想走？",
                "你最近有没有一件事，做了之后觉得「早该这样」？",
                "你有没有一个地方，小时候特别喜欢去，现在还记得？",
                "你最喜欢的一种放松方式是什么？",
                "你有没有一个人，见到就会莫名开心？",
                "你有没有一句话，最近常在脑子里出现？",
                "你平时怎么解压，哪种方式对你最管用？",
                "你最近有没有一个「这件事做对了」的瞬间？",
                "你觉得最近有没有哪一天，过得特别顺？发生了什么？",
                "你有没有一种颜色特别喜欢，为什么？",
                "你有没有一样东西，买了觉得特别值？",
                "你有没有一件正在期待的事，哪怕只是很小的一件？"
            ],
            middle: [
                "你有没有做完一件事之后，才发现原来自己是这种人？",
                "你现在的状态，跟三年前相比，最大的变化是什么？",
                "你有没有一段关系，让你对「相处」这件事的想法变了很多？",
                "你有没有一个决定，当时很纠结，现在回头看觉得做对了？",
                "你在哪件事上最容易被误解？",
                "你有没有一件事，以前觉得很重要，后来却慢慢不在意了？",
                "你觉得对你影响最大的一个人是谁，他/她改变了你什么？",
                "你有没有哪一段时期，现在回头看觉得自己变化最大？",
                "你生活里最难取舍的一件事是什么？",
                "你有没有一件事，想做但一直在推迟，是什么阻止了你？",
                "你觉得真正的「懂你」是什么感觉，你有过吗？",
                "你有没有哪一件事，花了很长时间才真正接受？",
                "你觉得自己在关系里最难改的一个问题是什么？",
                "你有没有一种恐惧，已经习惯了但从来没真正面对过？",
                "你觉得你在什么情况下最像真实的自己？",
                "你有没有一件事，做了之后觉得「我比自己以为的更勇敢」？",
                "你觉得什么叫「够了」？你现在达到了吗？",
                "你有没有一段经历，让你对某件事的看法彻底变了？",
                "你有没有一种状态，你以为自己克服了，结果发现还在？",
                "你在哪件事上，比大多数人更有耐心？",
                "你有没有一件事，一直觉得「时机还没到」？",
                "你觉得最近你在哪方面花了太多精力，但其实不值得？",
                "你有没有一个目标，追的时候很累，但放弃又舍不得？",
                "你觉得你现在最缺的是什么？是时间、能量，还是别的？",
                "你有没有一个习惯，已经持续很久，你觉得它真的改变了你？",
                "你最近有没有在「逃避」什么？是什么？",
                "你觉得自己最近在成长的地方是什么？",
                "你有没有本来觉得会很难，结果做了发现没那么难的事？",
                "你现在最让自己满意的状态是什么？",
                "你觉得你和五年后的自己最大的不同会是什么？"
            ],
            hard: [
                "你有没有一种感觉，很想被人看见，但每次快说出来又咽回去了？",
                "你会不会有时候觉得，你现在过的生活和你真正想要的之间有一段距离？",
                "你有没有一个人，让你第一次意识到「原来被人这样对待是什么感觉」？",
                "你有没有一种情绪，你很少在别人面前表达，但其实一直都有？",
                "你有没有某一刻，觉得自己真的被接住了，那是什么时候？",
                "你会不会有时候害怕，如果你变得很不一样，身边的人还会不会留下来？",
                "你觉得你这辈子，有没有真正被一个人完全理解过？",
                "你有没有一件事，你知道应该放下，但就是没办法？",
                "你有没有一种渴望，你觉得说出来会显得太幼稚？",
                "你有没有一段时期，觉得特别孤独，但不知道怎么开口？",
                "你觉得你最难被爱到的地方是什么？",
                "你有没有一件事，你非常害怕失去，但从来不说？",
                "你会不会有时候觉得，其实你比别人看到的你，更需要被关心？",
                "你有没有一段关系，到现在还没有真正告别的？",
                "你在什么时候最容易感到不安全？",
                "你有没有一种担心，关于你自己，觉得可能永远不会消失？",
                "你有没有一个瞬间，突然意识到自己已经长大了，是什么感觉？",
                "你觉得「被爱」对你来说是什么感觉？你现在有这种感觉吗？",
                "你有没有某一天，什么都没发生，但你就是很难过？",
                "你最脆弱的时候，最不想被人看见，还是最想有人陪？",
                "你有没有一个人，你知道很难再联系了，但偶尔还是会想起？",
                "你有没有一件事，一直希望有人主动问你，但没人问？",
                "你有没有什么部分，是你一直在藏着的，藏着藏着连自己都习惯了？",
                "你有没有对自己说过「我不应该有这种感觉」，然后把它压下去？",
                "你最难开口说的那几个字是什么？",
                "你有没有一段时间，在努力维持某种状态，但其实快撑不住了？",
                "你有没有一件你一直记得的好意，但对方可能已经忘了？",
                "如果你能被人完全了解，你最希望对方知道什么？",
                "你有没有某个瞬间，突然觉得「不管怎样，这一刻还挺好的」？",
                "你觉得你现在这个阶段，最需要的是什么？"
            ]
        };

        let usedIndex = { easy:[], middle:[], hard:[] };

        function getQuestion(type) {
            const el = document.getElementById('showQ');
            const list = questionList[type];
            const used = usedIndex[type];
            const avail = list.filter((_,i) => !used.includes(i));
            if (avail.length === 0) {
                el.className = 'question-text placeholder';
                el.innerText = '这个深度的题已抽完，点「重置全部」重新开始';
                return;
            }
            const rnd = Math.floor(Math.random() * avail.length);
            const q = avail[rnd];
            used.push(list.indexOf(q));
            el.className = 'question-text';
            el.innerText = q;
        }

        function resetAll() {
            usedIndex = { easy:[], middle:[], hard:[] };
            const el = document.getElementById('showQ');
            el.className = 'question-text placeholder';
            el.innerText = '选择一个深度，抽取第一道题';
        }
    </script>
</body>
</html>
