<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心灵奇旅</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #FFF8F2;
      --card:    #FFFFFF;
      --accent:  #5E8CB5;
      --accent-lt: rgba(94,140,181,.12);
      --text:    #1A1108;
      --muted:   #9A8070;
      --soft:    #EDE8E2;
      --ease:    cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
      background:
        radial-gradient(ellipse 100% 55% at 50% 0%, rgba(94,140,181,.1) 0%, transparent 65%),
        var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 80px;
      color: var(--text);
    }

    /* ── 顶部导航 ── */
    .nav {
      width: 100%;
      max-width: 600px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 0;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: .06em;
      transition: color .2s;
    }
    .back:hover { color: var(--accent); }
    .game-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── 主体 ── */
    .wrap {
      width: 100%;
      max-width: 600px;
      margin-top: 52px;
    }

    /* ── 标题 ── */
    .heading {
      text-align: center;
      margin-bottom: 44px;
    }
    .heading h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 44px;
      font-weight: 900;
      letter-spacing: -.01em;
      color: var(--text);
      margin-bottom: 10px;
    }
    .heading p {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: .04em;
    }

    /* ── 难度选择 ── */
    .depth-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      justify-content: center;
    }
    .depth-btn {
      padding: 8px 22px;
      border: 1.5px solid var(--soft);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--muted);
      background: var(--card);
      cursor: pointer;
      font-family: inherit;
      transition: all .22s var(--ease);
    }
    .depth-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .depth-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(94,140,181,.3);
    }

    /* ── 问题卡 ── */
    .question-card {
      background: var(--card);
      border-radius: 28px;
      box-shadow:
        0 2px 0 rgba(94,140,181,.08),
        0 12px 48px rgba(0,0,0,.08),
        0 2px 8px rgba(0,0,0,.04);
      padding: 0;
      overflow: hidden;
      margin-bottom: 20px;
    }

    /* 顶部蓝色区 */
    .card-top {
      background: linear-gradient(135deg, var(--accent) 0%, #7AAECC 100%);
      height: 8px;
    }

    /* 卡片主体 */
    .card-body {
      padding: 56px 52px 52px;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
    }

    /* 顶部左侧装饰竖线 */
    .card-body::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      border-radius: 0 0 3px 3px;
      opacity: .35;
    }

    .question-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 300;
      line-height: 2.15;
      color: var(--text);
      position: relative;
      z-index: 1;
      animation: qIn .5s var(--ease) both;
    }
    .question-text.placeholder {
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: .04em;
      line-height: 2;
      animation: none;
    }

    @keyframes qIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 底部操作 ── */
    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }
    .tip {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .02em;
    }
    .reset-btn {
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: 1.5px solid var(--soft);
      border-radius: 100px;
      padding: 7px 18px;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      letter-spacing: .02em;
    }
    .reset-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── 进度条 ── */
    .progress {
      margin-top: 32px;
      text-align: center;
    }
    .progress-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .08em;
      margin-bottom: 8px;
    }
    .progress-dots {
      display: flex;
      gap: 5px;
      justify-content: center;
    }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--soft);
      transition: background .3s;
    }
    .dot.used { background: var(--accent); opacity: .5; }
    .dot.current { background: var(--accent); opacity: 1; }

    @media (max-width: 480px) {
      body { padding: 0 16px 60px; }
      .heading h1 { font-size: 34px; }
      .card-body { padding: 44px 28px 40px; min-height: 200px; }
      .question-text { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div class="nav">
    <a class="back" href="../">← 返回</a>
    <span class="game-label">关系游戏 · 01</span>
  </div>

  <div class="wrap">
    <div class="heading">
      <h1>心灵奇旅</h1>
      <p>从轻松到深入，让对话自然流动</p>
    </div>

    <div class="depth-row">
      <button class="depth-btn" onclick="getQuestion('easy', this)">轻松</button>
      <button class="depth-btn" onclick="getQuestion('middle', this)">深入</button>
      <button class="depth-btn" onclick="getQuestion('hard', this)">走心</button>
    </div>

    <div class="question-card">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="question-text placeholder" id="showQ">选择一个深度，抽取第一道题</div>
      </div>
    </div>

    <div class="actions">
      <span class="tip"></span>
      <button class="reset-btn" onclick="resetAll()">重置全部</button>
    </div>
  </div>

  <script>
    const questionList = {
      easy: [
        "你最近有没有哪一个瞬间，突然觉得今天还挺幸福的？",
        "你小时候最喜欢放学后的什么感觉？",
        "你会不会有那种特别喜欢的天气？",
        "你最近有没有循环很久的一首歌？",
        "你会更喜欢：一个人散步，还是和舒服的人一起乱逛？",
        "你有没有那种「虽然很普通，但会让你开心的小事」？",
        "你小时候有没有很奇怪但特别坚持的小梦想？",
        "你会不会有一种食物，一吃就很有安全感？",
        "你旅游的时候更喜欢计划好，还是随缘走？",
        "你有没有一个地方，会让你特别想反复回去？",
        "你觉得你小时候和现在最大的变化是什么？",
        "你觉得别人最容易误解你的点是什么？",
        "你有没有一种：以前很在意，现在突然没那么在意的东西？",
        "你会更容易被什么样的人吸引：有趣的人，还是稳定的人？",
        "你会不会对那种很push的人天然有点累？",
        "你一般怎么判断一个人相处起来舒不舒服？",
        "你有没有那种：第一次见面就感觉这个人气场不对的经验？",
        "你觉得真正成熟的人是什么样？",
        "你有没有一个城市，去了就不想走？",
        "你最近有没有一件事，做了之后觉得「早该这样」？",
        "你有没有一个地方，小时候特别喜欢去，现在还记得？",
        "你最喜欢的一种放松方式是什么？",
        "你有没有一个人，见到就会莫名开心？",
        "你有没有一句话，最近常在脑子里出现？",
        "你平时怎么解压，哪种方式对你最管用？",
        "你最近有没有一个「这件事做对了」的瞬间？",
        "你觉得最近有没有哪一天，过得特别顺？发生了什么？",
        "你有没有一种颜色特别喜欢，为什么？",
        "你有没有一样东西，买了觉得特别值？",
        "你有没有一件正在期待的事，哪怕只是很小的一件？"
      ],
      middle: [
        "你有没有做完一件事之后，才发现原来自己是这种人？",
        "你现在的状态，跟三年前相比，最大的变化是什么？",
        "你有没有一段关系，让你对「相处」这件事的想法变了很多？",
        "你有没有一个决定，当时很纠结，现在回头看觉得做对了？",
        "你在哪件事上最容易被误解？",
        "你有没有一件事，以前觉得很重要，后来却慢慢不在意了？",
        "你觉得对你影响最大的一个人是谁，他/她改变了你什么？",
        "你有没有哪一段时期，现在回头看觉得自己变化最大？",
        "你生活里最难取舍的一件事是什么？",
        "你有没有一件事，想做但一直在推迟，是什么阻止了你？",
        "你觉得真正的「懂你」是什么感觉，你有过吗？",
        "你有没有哪一件事，花了很长时间才真正接受？",
        "你觉得自己在关系里最难改的一个问题是什么？",
        "你有没有一种恐惧，已经习惯了但从来没真正面对过？",
        "你觉得你在什么情况下最像真实的自己？",
        "你有没有一件事，做了之后觉得「我比自己以为的更勇敢」？",
        "你觉得什么叫「够了」？你现在达到了吗？",
        "你有没有一段经历，让你对某件事的看法彻底变了？",
        "你有没有一种状态，你以为自己克服了，结果发现还在？",
        "你在哪件事上，比大多数人更有耐心？",
        "你有没有一件事，一直觉得「时机还没到」？",
        "你觉得最近你在哪方面花了太多精力，但其实不值得？",
        "你有没有一个目标，追的时候很累，但放弃又舍不得？",
        "你觉得你现在最缺的是什么？是时间、能量，还是别的？",
        "你有没有一个习惯，已经持续很久，你觉得它真的改变了你？",
        "你最近有没有在「逃避」什么？是什么？",
        "你觉得自己最近在成长的地方是什么？",
        "你有没有本来觉得会很难，结果做了发现没那么难的事？",
        "你现在最让自己满意的状态是什么？",
        "你觉得你和五年后的自己最大的不同会是什么？"
      ],
      hard: [
        "你有没有一种感觉，很想被人看见，但每次快说出来又咽回去了？",
        "你会不会有时候觉得，你现在过的生活和你真正想要的之间有一段距离？",
        "你有没有一个人，让你第一次意识到「原来被人这样对待是什么感觉」？",
        "你有没有一种情绪，你很少在别人面前表达，但其实一直都有？",
        "你有没有某一刻，觉得自己真的被接住了，那是什么时候？",
        "你会不会有时候害怕，如果你变得很不一样，身边的人还会不会留下来？",
        "你觉得你这辈子，有没有真正被一个人完全理解过？",
        "你有没有一件事，你知道应该放下，但就是没办法？",
        "你有没有一种渴望，你觉得说出来会显得太幼稚？",
        "你有没有一段时期，觉得特别孤独，但不知道怎么开口？",
        "你觉得你最难被爱到的地方是什么？",
        "你有没有一件事，你非常害怕失去，但从来不说？",
        "你会不会有时候觉得，其实你比别人看到的你，更需要被关心？",
        "你有没有一段关系，到现在还没有真正告别的？",
        "你在什么时候最容易感到不安全？",
        "你有没有一种担心，关于你自己，觉得可能永远不会消失？",
        "你有没有一个瞬间，突然意识到自己已经长大了，是什么感觉？",
        "你觉得「被爱」对你来说是什么感觉？你现在有这种感觉吗？",
        "你有没有某一天，什么都没发生，但你就是很难过？",
        "你最脆弱的时候，最不想被人看见，还是最想有人陪？",
        "你有没有一个人，你知道很难再联系了，但偶尔还是会想起？",
        "你有没有一件事，一直希望有人主动问你，但没人问？",
        "你有没有什么部分，是你一直在藏着的，藏着藏着连自己都习惯了？",
        "你有没有对自己说过「我不应该有这种感觉」，然后把它压下去？",
        "你最难开口说的那几个字是什么？",
        "你有没有一段时间，在努力维持某种状态，但其实快撑不住了？",
        "你有没有一件你一直记得的好意，但对方可能已经忘了？",
        "如果你能被人完全了解，你最希望对方知道什么？",
        "你有没有某个瞬间，突然觉得「不管怎样，这一刻还挺好的」？",
        "你觉得你现在这个阶段，最需要的是什么？"
      ]
    };

    let usedIndex = { easy: [], middle: [], hard: [] };
    let currentType = null;

    function getQuestion(type, btn) {
      currentType = type;
      document.querySelectorAll('.depth-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');

      const el = document.getElementById('showQ');
      const list = questionList[type];
      const used = usedIndex[type];
      const avail = list.map((_, i) => i).filter(i => !used.includes(i));

      if (avail.length === 0) {
        triggerAnim(el);
        el.className = 'question-text placeholder';
        el.innerText = '这个深度的题已抽完，点「重置全部」重新开始';
        return;
      }

      const idx = avail[Math.floor(Math.random() * avail.length)];
      used.push(idx);

      triggerAnim(el);
      el.className = 'question-text';
      el.innerText = list[idx];

      updateProgress(type);
    }

    function triggerAnim(el) {
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    }

    function updateProgress() {}

    function resetAll() {
      usedIndex = { easy: [], middle: [], hard: [] };
      currentType = null;
      document.querySelectorAll('.depth-btn').forEach(b => b.classList.remove('active'));
      const el = document.getElementById('showQ');
      el.className = 'question-text placeholder';
      el.innerText = '已重置，重新选择深度';
      document.getElementById('progressLabel').style.display = 'none';
      document.getElementById('progressDots').innerHTML = '';
    }
  </script>
</body>
</html>
