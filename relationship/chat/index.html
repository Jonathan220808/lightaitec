<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵奇旅</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #FFF8F2;
            --card:     #FFFDF9;
            --accent:   #C4735A;
            --accent-dk:#8B3E27;
            --soft:     #F5E6DC;
            --text:     #1C1008;
            --muted:    #9A7A68;
            --ease:     cubic-bezier(0.16,1,0.3,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
            background:
                radial-gradient(ellipse 110% 45% at 50% 0%, rgba(196,115,90,.14) 0%, transparent 65%),
                var(--bg);
            min-height: 100vh;
            padding: 32px 20px 60px;
            color: var(--text);
        }

        /* ── 返回 ── */
        .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--muted);
            text-decoration: none;
            margin-bottom: 28px;
            transition: color .2s;
        }
        .back:hover { color: var(--accent); }

        .container { max-width: 560px; margin: 0 auto; }

        /* ── 标题区 ── */
        .title-area {
            text-align: center;
            margin-bottom: 40px;
        }
        .title-area h1 {
            font-family: 'Noto Serif SC','STSong',serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: .05em;
            margin-bottom: 8px;
        }
        .title-area p {
            font-size: 13px;
            color: var(--muted);
        }

        /* ── 难度选择按钮 ── */
        .diff-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 28px;
        }
        .diff-btn {
            padding: 16px 0;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform .18s var(--ease), box-shadow .18s var(--ease);
            letter-spacing: .04em;
            font-family: inherit;
        }
        .diff-btn:hover  { transform: translateY(-2px); box-shadow:0 6px 20px rgba(196,115,90,.22); }
        .diff-btn:active { transform: translateY(0); }

        .easy   { background: var(--soft); color: var(--accent-dk); }
        .middle { background: var(--accent); color: #fff; }
        .hard   { background: var(--accent-dk); color: #fff; }

        /* ── 问题展示卡 ── */
        .question-card {
            background: var(--card);
            border-radius: 24px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 6px 32px rgba(44,18,6,.09);
            padding: 44px 36px;
            min-height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        .quote-mark {
            font-family: Georgia, serif;
            font-size: 64px;
            line-height: 1;
            color: var(--soft);
            position: absolute;
            top: 16px;
            left: 24px;
            user-select: none;
        }
        .question-text {
            font-size: 19px;
            color: var(--text);
            line-height: 2;
            font-weight: 400;
            position: relative;
            z-index: 1;
        }
        .question-text.placeholder {
            font-size: 15px;
            color: var(--muted);
        }

        /* ── 操作区 ── */
        .actions {
            margin-top: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .tip {
            font-size: 12px;
            color: var(--muted);
        }
        .reset-btn {
            font-size: 12px;
            color: var(--muted);
            background: var(--soft);
            border: none;
            border-radius: 100px;
            padding: 6px 16px;
            cursor: pointer;
            transition: background .2s, color .2s;
            font-family: inherit;
        }
        .reset-btn:hover { background: var(--accent); color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <a class="back" href="../">← 返回</a>

        <div class="title-area">
            <h1>心灵奇旅</h1>
            <p>从轻松到深入，让对话自然流动</p>
        </div>

        <div class="diff-row">
            <button class="diff-btn easy"   onclick="getQuestion('easy')">轻松</button>
            <button class="diff-btn middle" onclick="getQuestion('middle')">深入</button>
            <button class="diff-btn hard"   onclick="getQuestion('hard')">走心</button>
        </div>

        <div class="question-card">
            <span class="quote-mark">"</span>
            <div class="question-text placeholder" id="showQ">选择一个深度，抽取第一道题</div>
        </div>

        <div class="actions">
            <span class="tip">抽过的题不会重复出现</span>
            <button class="reset-btn" onclick="resetAll()">重置全部</button>
        </div>
    </div>

    <script>
        const questionList = {
            easy: [
                "你最近有没有哪一个瞬间，突然觉得今天还挺幸福的？",
                "你小时候最喜欢放学后的什么感觉？",
                "你会不会有那种特别喜欢的天气？",
                "你最近有没有循环很久的一首歌？",
                "你会更喜欢：一个人散步，还是和舒服的人一起乱逛？",
                "你有没有那种「虽然很普通，但会让你开心的小事」？",
                "你小时候有没有很奇怪但特别坚持的小梦想？",
                "你会不会有一种食物，一吃就很有安全感？",
                "你旅游的时候更喜欢计划好，还是随缘走？",
                "你有没有一个地方，会让你特别想反复回去？",
                "你觉得你小时候和现在最大的变化是什么？",
                "你觉得别人最容易误解你的点是什么？",
                "你有没有一种：以前很在意，现在突然没那么在意的东西？",
                "你会更容易被什么样的人吸引：有趣的人，还是稳定的人？",
                "你会不会对那种很push的人天然有点累？",
                "你一般怎么判断一个人相处起来舒不舒服？",
                "你有没有那种：第一次见面就感觉这个人气场不对的经验？",
                "你觉得真正成熟的人是什么样？"
            ],
            middle: [
                "你会不会有时候特别想安静，不想解释自己？",
                "你觉得人与人之间最难的事情是什么？",
                "你小时候最被爱的一次记忆是什么？",
                "你有没有一个到现在都记得的拥抱？",
                "你人生里有没有一个人，改变过你很多？",
                "你有没有一次特别被理解的感觉？",
                "你有没有那种：表面没事，但其实心里记了很久的话？",
                "你觉得你会比较容易隐藏情绪吗？",
                "你有没有某个阶段特别孤独？",
                "你小时候会更像现在的你，还是完全不一样？",
                "你有没有一个现在回想起来还是会心软的人？",
                "你有没有某个瞬间，突然觉得自己长大了？",
                "你觉得关系里最重要的东西是什么？",
                "你觉得真正的尊重是什么？",
                "你会不会觉得很多人其实不太懂边界感？",
                "你觉得人为什么会想控制别人？",
                "你觉得爱更像：陪伴、理解、还是选择？",
                "你觉得人会因为被爱，而变得更勇敢吗？"
            ],
            hard: [
                "你会不会有时候其实很需要别人，但第一反应却是后退？",
                "你更害怕：被误解，还是被看穿？",
                "你有没有一种：其实很想被坚定选择，但又不太相信会发生的感觉？",
                "你会不会觉得，有的人出现以后，你会突然变得不像平时的自己？",
                "你会对什么样的人慢慢卸下防备？",
                "你有没有那种：其实已经难过了，但还是会先顾别人感受的时候？",
                "你觉得人与人之间最舒服的距离感是什么？",
                "你有没有经历过：明明关系没有吵架，但就是慢慢走散了？",
                "你觉得真正的偏爱，应该是什么样子？",
                "你会不会其实很讨厌那种，需要不断证明自己值得被爱的时候？",
                "你有没有一个一直藏得很深，别人不太知道的自己？",
                "你最不想变成什么样的大人？",
                "你觉得自己最敏感的地方是什么？",
                "你有没有那种：夜里突然情绪很重，但白天又像没事一样的阶段？",
                "你会不会经常把很多情绪自己消化掉？",
                "你觉得自己更像：外热内冷，还是外冷内热的人？",
                "你有没有一种，其实很想表达，但总觉得说出来会被误解的东西？",
                "你觉得你这些年，是在越来越靠近自己，还是越来越不像自己？",
                "你会不会有时候觉得，别人喜欢的只是'你好相处的那部分'？",
                "你有没有一个瞬间，突然意识到自己其实也很需要被照顾？",
                "你觉得被真正理解，是一种什么感觉？",
                "你会更容易因为什么而心动：细节、情绪、陪伴，还是安全感？",
                "你觉得人为什么会在亲密关系里受伤？",
                "你有没有一种：越在乎的人，反而越不知道怎么靠近的感觉？",
                "你觉得爱里最难做到的事情是什么？",
                "你会不会觉得，有的人不是不温柔，只是太害怕受伤了？",
                "你觉得长期关系里，新鲜感和安全感哪个更重要？",
                "你会因为一个人的情绪稳定，而慢慢喜欢上他吗？",
                "你有没有那种：本来已经习惯一个人，但后来突然开始想分享生活的时候？",
                "你觉得真正高级的喜欢，更像靠近，还是允许？",
                "你有没有一种，现在回头看，其实改变了你整个人生轨迹的小瞬间？",
                "你觉得孤独更像：没人陪，还是没人懂？",
                "你会不会觉得，很多人其实一生都没真正表达过自己？",
                "你有没有一个阶段，特别想从世界里消失几天？",
                "你觉得人为什么会渴望被看见？",
                "你有没有一种，明明已经很努力了，却还是觉得自己不够好的时候？",
                "你觉得成长最痛的一部分是什么？",
                "你有没有发现，有时候人最脆弱的时候，反而最真实？",
                "你觉得一个人真正强大之后，会变成什么样？",
                "你觉得人与人之间最深的连接，到底是什么？"
            ]
        };

        let usedIndex = { easy:[], middle:[], hard:[] };

        function getQuestion(type) {
            const el = document.getElementById('showQ');
            const list = questionList[type];
            const used = usedIndex[type];
            const avail = list.filter((_,i) => !used.includes(i));
            if (avail.length === 0) {
                el.className = 'question-text placeholder';
                el.innerText = '这个深度的题已抽完，点「重置全部」重新开始';
                return;
            }
            const rnd = Math.floor(Math.random() * avail.length);
            const q = avail[rnd];
            used.push(list.indexOf(q));
            el.className = 'question-text';
            el.innerText = q;
        }

        function resetAll() {
            usedIndex = { easy:[], middle:[], hard:[] };
            const el = document.getElementById('showQ');
            el.className = 'question-text placeholder';
            el.innerText = '选择一个深度，抽取第一道题';
        }
    </script>
</body>
</html>
