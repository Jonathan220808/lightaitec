<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翻出真心</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #F5F3EF;
      --card:    #FFFFFF;
      --accent:  #5D8F72;
      --accent-dk: #3D6B52;
      --soft:    #E4EDE8;
      --text:    #1A1108;
      --muted:   #7A8C80;
      --ease:    cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 32px 16px 60px;
      color: var(--text);
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 20px;
      transition: color .2s;
    }
    .back:hover { color: var(--accent); }

    .box { max-width: 960px; margin: 0 auto; text-align: center; }

    /* ── 人数选择屏 ── */
    .count-screen { padding: 24px 20px 56px; }
    .count-screen h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 38px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: .02em;
    }
    .count-screen > p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 48px;
    }
    .count-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .count-btn {
      width: 160px;
      border-radius: 18px;
      border: none;
      background: var(--card);
      cursor: pointer;
      transition: .24s var(--ease);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
      font-family: inherit;
    }
    .count-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 36px rgba(93,143,114,.22);
    }
    .count-btn .btn-top {
      height: 100px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .count-btn .btn-top::before {
      content: '';
      position: absolute;
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 24px solid rgba(255,255,255,.1);
      top: -30px; right: -30px;
    }
    .count-btn:nth-child(2) .btn-top { background: var(--accent-dk); }
    .count-btn:nth-child(3) .btn-top { background: #2D5040; }
    .count-btn .num {
      font-family: 'Noto Serif SC', serif;
      font-size: 52px;
      font-weight: 900;
      color: rgba(255,255,255,.9);
      line-height: 1;
      position: relative;
      z-index: 1;
    }
    .count-btn .lbl {
      font-size: 13px;
      color: var(--muted);
      padding: 16px 0 18px;
      background: var(--card);
    }

    /* ── 游戏主屏 ── */
    h1 {
      font-family: 'Noto Serif SC', serif;
      color: var(--text);
      margin-bottom: 6px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: .02em;
    }
    .mode-tag {
      display: inline-block;
      font-size: 11px;
      color: var(--accent);
      background: var(--soft);
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
      font-weight: 700;
      letter-spacing: .06em;
    }
    .tip {
      font-size: 15px;
      margin: 0 0 24px;
      color: var(--text);
      font-weight: 500;
      min-height: 26px;
    }

    /* ── 卡牌区 ── */
    .card-wrap {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 0 0 28px;
    }

    .card {
      width: 172px;
      min-height: 220px;
      border-radius: 20px;
      background: var(--card);
      box-shadow: 0 3px 20px rgba(0,0,0,.09), 0 1px 4px rgba(0,0,0,.05);
      cursor: pointer;
      transition: .26s var(--ease);
      border: 2.5px solid transparent;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px 16px;
      overflow: hidden;
    }
    .card:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(0,0,0,.13); }

    .card p {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
      font-weight: 900;
      color: var(--text);
      line-height: 1.65;
      letter-spacing: .04em;
    }

    .card.active {
      border-color: var(--accent);
      background: #fff;
      transform: translateY(-10px) scale(1.07);
      box-shadow: 0 0 0 3px rgba(93,143,114,.2), 0 20px 44px rgba(93,143,114,.28);
    }

    .card.revealed {
      border-color: var(--accent);
      background: #F0F8F3;
      transform: translateY(-6px);
      box-shadow: 0 0 0 4px rgba(93,143,114,.18), 0 16px 36px rgba(93,143,114,.25);
    }
    .card.revealed p { color: #3D6B52; font-weight: 900; }

    /* ── 按钮 ── */
    .btn-group {
      margin: 0 0 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 11px 24px;
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: 100px;
      font-size: 14px;
      cursor: pointer;
      transition: .2s var(--ease);
      font-family: inherit;
      font-weight: 600;
      letter-spacing: .02em;
    }
    .btn:hover { background: var(--accent-dk); transform: translateY(-1px); }
    .btn:disabled { background: #D4D8D5; color: #9AAB9F; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid #C8D4CC;
    }
    .btn-reset:hover { background: var(--soft); color: var(--text); }
    .btn-gray {
      background: var(--soft);
      color: var(--muted);
    }
    .btn-gray:hover { background: #D4E0D8; color: var(--text); }

    .result {
      font-size: 15px;
      font-weight: 500;
      margin: 4px 0;
      min-height: 26px;
      line-height: 2.2;
      color: var(--text);
    }

    @media (max-width: 600px) {
      .card { width: 140px; min-height: 190px; padding: 16px 12px; }
      .card p { font-size: 14px; }
      .count-btn { width: 130px; }
    }
  </style>
</head>
<body>
  <a class="back" href="../">← 返回</a>
  <div class="box">

    <!-- 人数选择屏 -->
    <div id="countScreen" class="count-screen">
      <h1>翻出真心</h1>
      <p>玩家 1 展示自己，其他人来猜——选择游戏人数</p>
      <p style="font-size:12px;color:var(--muted);line-height:1.7;margin:10px auto 0;max-width:420px;">线下同屏玩：不用点“联机玩”，选人数后按提示轮流递手机；不在一起或想各用各的手机时再用联机。</p>
      <div class="count-btns">
        <button class="count-btn" onclick="startWithCount(2)">
          <div class="btn-top"><span class="num">2</span></div>
          <span class="lbl">2 人游戏</span>
        </button>
        <button class="count-btn" onclick="startWithCount(3)">
          <div class="btn-top"><span class="num">3</span></div>
          <span class="lbl">3 人游戏</span>
        </button>
        <button class="count-btn" onclick="startWithCount(4)">
          <div class="btn-top"><span class="num">4</span></div>
          <span class="lbl">4 人游戏</span>
        </button>
      </div>
      <div style="margin-top:24px;padding:0 4px;">
        <div id="flipMpCtrl" style="display:none;margin-bottom:12px;"></div>
        <button id="flipMpBtn" onclick="openFlipMp()" style="width:100%;padding:13px;border-radius:13px;border:1.5px solid rgba(93,143,114,.3);background:transparent;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">🌐 联机玩（各用各的手机·可线上）</button>
      </div>
    </div>

    <!-- 游戏主屏 -->
    <div id="gameScreen" style="display:none">
      <h1>翻出真心</h1>
      <span id="modeTag" class="mode-tag"></span>
      <div class="tip" id="tip"></div>
      <div class="card-wrap" id="cardBox"></div>
      <div class="btn-group">
        <button class="btn" id="sureBtn" onclick="sureSelect()" disabled>确认选择</button>
        <button class="btn btn-gray" id="nextBtn" onclick="nextRound()" style="display:none">下一轮</button>
        <button class="btn btn-reset" onclick="fullReset()">重置游戏</button>
        <button class="btn btn-gray" onclick="changeCount()">换人数</button>
      </div>
      <div class="result" id="result"></div>
    </div>

  </div>

  <script>
    const cardList = [
      ["喜欢被人关注","容易心软善良","害怕被人讨厌","习惯性迁就别人","容易感到孤独"],
      ["在意他人眼光","喜欢安静独处","容易胡思乱想","性格温柔包容","内心缺乏安全感"],
      ["容易情绪敏感","习惯假装坚强","不擅长表达爱","容易自我内耗","待人真诚心软"],
      ["害怕发生冲突","喜欢简单相处","容易多虑焦虑","习惯性体谅他人","容易委屈自己"],
      ["慢热不善社交","容易怀旧念旧","害怕别人失望","喜欢稳定生活","容易想太多"],
      ["你很在意别人对你的评价","你不习惯主动表达自己需求","你常常默默消化所有坏情绪","你待人温柔但很容易吃亏","你内心细腻非常敏感"],
      ["你害怕人际关系出现矛盾","你习惯性优先成全别人","你容易因为小事反复纠结","你不喜欢麻烦任何人帮忙","你常常自我怀疑不自信"],
      ["你喜欢低调不爱张扬表现","你很珍惜身边每一段关系","你容易共情别人消耗自己","你遇事习惯自己硬扛到底","你很难真正放松下来"],
      ["你会过于执着于自己的计划","你会很依赖他人","你不懂表达自己的情绪","你总是喜欢控制别人","你常常会感受到内疚"],
      ["遇事容易胡思乱想内耗自己","习惯性讨好身边的所有人","害怕拒绝别人不好意思说不","内心敏感在意他人眼光","常常压抑自己的真实感受"],
      ["做事容易犹豫不决选择困难","很在意别人对自己的看法","不擅长主动表达内心需求","容易委屈自己成全别人","经常莫名感到情绪低落"],
      ["习惯把心事全部藏在心里面","对自己要求过高容易焦虑","不懂得好好善待疼爱自己","遇事习惯性先责怪自己","很难真正放松下来休息"],
      ["害怕人际关系中的冲突矛盾","总是过度为他人操心担心","容易自我否定怀疑自己","不擅长拒绝害怕得罪别人","内心缺乏足够的安全感"],
      ["容易过度共情他人消耗自己","习惯默默承受所有压力","不善于求助总独自硬扛","容易因为小事反复纠结","常常习惯性自我怀疑"],
      ["性格慢热不擅长主动社交","面对陌生环境容易紧张","很害怕让身边人失望","习惯性过度思虑未来琐事","总是习惯性迁就别人"],
      ["有完美主义倾向追求极致","犯错后会长时间自我纠结","不擅长调节负面情绪","容易过度在意细节钻牛角尖","很难坦然接纳自己的不完美"],
      ["习惯隐藏脆弱假装很坚强","不喜欢麻烦任何人","遇事习惯先反思自己问题","容易被他人情绪影响心情","常常觉得自己不够优秀"],
      ["待人温柔但容易委屈自己","不懂拒绝导致身心疲惫","内心细腻敏感心思很重","习惯性压抑愤怒和不满","经常为别人的错误内耗自己"],
      ["渴望被理解接纳","害怕独处深夜情绪低落","习惯性自我克制","待人真诚不善伪装","容易心软原谅别人"],
      ["偏爱简单干净关系","害怕复杂人际交往","容易脑补各种情节","习惯性换位思考体谅","不喜欢与人争抢输赢"],
      ["性格温柔不争不抢","内心柔软容易受伤","习惯性照顾他人情绪","容易过度认真较真","很难放下过往遗憾"],
      ["喜欢低调安稳生活","害怕被人看穿内心","习惯性隐藏真实情绪","待人善良不懂防备","容易过度善良吃亏"],
      ["内心细腻心思很重","遇事谨慎不敢冒险","习惯性自我要求严格","容易焦虑未来未知","常常感到身心疲惫"],
      ["偏爱独处享受安静","害怕热闹社交场合","习惯性保持礼貌距离","容易共情心软善良","不擅长主动争取"],
      ["容易害羞不善表达","习惯性迁就包容他人","害怕给别人添麻烦","内心温柔十分暖心","容易自我否定自卑"],
      ["重感情十分念旧","珍惜每一段相遇缘分","害怕人际关系变淡","容易因为离别难过","习惯性独自治愈自己"],
      ["做事认真靠谱踏实","容易给自己施加压力","不懂放松只会硬撑","过度操心身边人和事","很难真正松弛自在"],
      ["内心单纯善良通透","习惯性包容他人缺点","容易原谅别人过错","不爱争抢习惯退让","常常忽略自己感受"],
      ["喜欢规律有条理的生活","不擅长临时应变","对亲近的人容易依赖","睡前容易胡思乱想","对未知事物有些抗拒"],
      ["说话直接不绕弯子","遇事喜欢自己扛","不习惯接受别人的好意","情绪来得快去得也快","偶尔会嘴硬不认输"],
      ["对感兴趣的事会全情投入","容易对不公平愤慨","习惯把没事挂在嘴边","有时说话太直接伤了人","不太会照顾自己身体"],
      ["内心有很多想法但不常说","对友情很忠诚执着","习惯用玩笑当铠甲","有时不知道自己真正想要什么","对陌生人会本能保持距离"],
      ["容易因为别人一句话开心很久","也容易因为一句话难过很久","喜欢给身边人准备惊喜","会为小小进步感到满足","希望被人温柔对待"],
      ["特别重视承诺","被信任的人背叛会很难恢复","说好的事一定会做到","对自己要求比对别人严","有些固执但不自知"],
      ["享受独处的时间","但又害怕真正的孤独","不喜欢说再见","珍惜每一个对你好的人","习惯用没什么回应关心"],
      ["感情里会主动付出","但希望对方偶尔也主动一次","很少直接说我需要你","讨厌争吵但也讨厌冷漠","有时候会用沉默测试别人"],
      ["对家人的期待很敏感","有时候很难做自己","在外面是一个人在家是另一个人","内心还住着没长大的小孩","对爸妈的一句话会很在意"],
      ["对喜欢的人会变得很小心翼翼","害怕表达之后被轻视","想靠近又不敢太近","感情里容易先付出更多","被认真对待时反而不知所措"],
      ["记性好但记的都是情绪","容易被过去的事情困住","大事忘了小细节还记着","时间久了才能真正原谅","对为什么当时那样反复想"],
      ["有时候很想被人宠","但嘴上不会承认","别人主动关心时会不自在","习惯用我自己来拒绝帮助","其实很需要有人问你还好吗"],
      ["习惯用幽默化解尴尬","不擅长正经说感谢","面对表扬会想找地方躲","但其实非常在意别人说的话","感受到被爱时会默默想哭"],
      ["需要时间才能信任一个人","一旦信任就会全心全意","被辜负了很难再打开心门","不擅长表达但心里都有数","选择留在就是认真的"],
      ["对陌生人客气有礼","但对亲近的人反而容易发脾气","明明很爱却总是让对方受委屈","事后总是后悔","最爱的人也最容易被你伤到"],
      ["喜欢热闹但也需要独自充电","社交完回家会累很久","对人很好但不是所有人","选择交心的人很少但很深","朋友不多但每个都是真的"],
      ["容易对事情上头","也容易突然丧失热情","喜欢开始但不太擅长坚持","对无聊很没有耐心","偶尔会有种我能做到一切的感觉"],
      ["很爱笑也很爱逗别人笑","但内心有一块地方不让人进","表面活泼内心需要安静","很容易喜欢上一个人","也很容易默默放手"],
      ["有完美主义却不承认","会想很久才行动","不轻易开口但开口必有重量","容易高估别人低估自己","偶尔会莫名奇妙自我怀疑"],
      ["容易记住被善待的瞬间","也容易记住被辜负的时刻","不轻易表达但情深","习惯用行动代替言语","很在乎但不擅长说出口"]
    ];

    const cardPool = cardList.flat();
    let currentCards = [];
    let selectArr = [];
    let allPlayerSelect = [];
    let currentPlayer = 1;
    let totalPlayer = 4;

    function startWithCount(n) {
      totalPlayer = n;
      document.getElementById('countScreen').style.display = 'none';
      document.getElementById('gameScreen').style.display = 'block';
      document.getElementById('modeTag').textContent = n + ' 人模式';
      initGame();
    }

    function changeCount() {
      document.getElementById('countScreen').style.display = 'block';
      document.getElementById('gameScreen').style.display = 'none';
    }

    function initGame() {
      selectArr = [];
      currentPlayer = 1;
      allPlayerSelect = [];
      document.getElementById("result").innerText = "";
      document.getElementById("nextBtn").style.display = "none";
      document.getElementById("sureBtn").disabled = true;
      document.getElementById("tip").innerText = `玩家1：请选择 2 张能描述自己的卡牌`;
      renderCard();
    }

    function renderCard() {
      clearCardActive();
      selectArr = [];
      const shuffled = [...cardPool].sort(() => Math.random() - 0.5);
      currentCards = shuffled.slice(0, 5);
      let html = "";
      for (let i = 0; i < 5; i++) {
        html += `<div class="card" onclick="chooseCard(${i},this)"><p>${currentCards[i]}</p></div>`;
      }
      document.getElementById("cardBox").innerHTML = html;
      document.getElementById("cardBox").style.pointerEvents = "";
      document.getElementById("sureBtn").disabled = true;
      if(flipInMp && flipMpIsSubject)
        flipSend({type:'guess_round_data', roundData:{cards: currentCards}});
    }

    function chooseCard(index, dom) {
      if (selectArr.length >= 2 && !dom.classList.contains("active")) return;
      if (dom.classList.contains("active")) {
        dom.classList.remove("active");
        selectArr.splice(selectArr.indexOf(index), 1);
      } else {
        dom.classList.add("active");
        selectArr.push(index);
      }
      document.getElementById("sureBtn").disabled = selectArr.length !== 2;
    }

    function sureSelect() {
      if(flipInMp) {
        if(currentPlayer===1){
          flipSend({type:'guess_subject_done', selection: selectArr});
          document.getElementById('sureBtn').disabled=true;
          document.getElementById('sureBtn').textContent='✅ 已提交，等待他人猜测…';
          allPlayerSelect.push([...selectArr]);
        } else {
          flipSend({type:'guess_player_guess', guess: selectArr});
          document.getElementById('sureBtn').disabled=true;
          document.getElementById('sureBtn').textContent='✅ 已提交猜测';
          allPlayerSelect.push([...selectArr]);
        }
        return;
      }
      allPlayerSelect.push([...selectArr]);
      if (currentPlayer < totalPlayer) {
        currentPlayer++;
        clearCardActive();
        selectArr = [];
        if (currentPlayer === 2) {
          document.getElementById("tip").innerText = `玩家2：猜猜玩家1选了哪 2 张`;
        } else {
          document.getElementById("tip").innerText = `玩家${currentPlayer}：猜猜玩家1选了哪 2 张`;
        }
        document.getElementById("sureBtn").disabled = true;
      } else {
        judgeResult();
        document.getElementById("nextBtn").style.display = "inline-block";
        document.getElementById("sureBtn").disabled = true;
      }
    }

    function judgeResult() {
      const standard = [...allPlayerSelect[0]];
      const cards = currentCards;
      document.getElementById("cardBox").style.pointerEvents = "none";
      document.querySelectorAll(".card").forEach((el, i) => {
        el.classList.remove("active");
        if (standard.includes(i)) el.classList.add("revealed");
      });
      let resText = `<span style="color:var(--muted);font-weight:400;font-size:14px">玩家1的选择：「${cards[standard[0]]}」和「${cards[standard[1]]}」</span><br/><br/>`;
      for (let i = 1; i < totalPlayer; i++) {
        const ps = [...allPlayerSelect[i]];
        const matchCount = ps.filter(idx => standard.includes(idx)).length;
        if (matchCount === 2) {
          resText += `✅ 玩家${i + 1}：全猜对了！<br/>`;
        } else if (matchCount === 1) {
          const rightIdx = ps.find(idx => standard.includes(idx));
          resText += `🌓 玩家${i + 1}：猜中了一张「${cards[rightIdx]}」<br/>`;
        } else {
          resText += `🤍 玩家${i + 1}：这次没猜中，原来这才是真实的 TA～<br/>`;
        }
      }
      document.getElementById("result").innerHTML = resText;
    }

    function clearCardActive() {
      document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
    }

    function nextRound() { initGame(); }
    function fullReset() { initGame(); }

  </script>

  <!-- 联机覆盖层 -->
  <div id="flipMpOverlay" style="display:none;position:fixed;inset:0;background:rgba(244,248,245,.97);z-index:300;overflow-y:auto;padding:28px 20px 60px;max-width:480px;margin:0 auto;left:0;right:0;">
    <button onclick="closeFlipMp()" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted);padding:0 0 20px;font-family:inherit;">← 返回</button>
    <div id="flipMpS1">
      <h2 style="font-family:'Noto Serif SC',serif;font-size:26px;font-weight:900;margin-bottom:8px;">联机·翻出真心</h2>
      <p style="font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.6;">多台手机同步，线下或线上都能玩</p>
      <input id="flipMpName" type="text" placeholder="先输入你的昵称（最多12字）" maxlength="12" style="width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid rgba(154,128,112,.25);font-size:15px;font-family:inherit;background:#fff;outline:none;margin-bottom:10px;display:block;">
      <button onclick="flipMpConfirm()" style="width:100%;padding:15px;border-radius:13px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px;">确认昵称</button>
      <p id="flipMpErr" style="font-size:13px;color:#C0392B;min-height:18px;"></p>
    </div>
    <div id="flipMpS2" style="display:none;">
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">你好，<b id="flipMpCN"></b> 👋</p>
      <button onclick="flipMpCreate()" style="width:100%;padding:15px;border-radius:13px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px;">创建房间（我来主持）</button>
      <div style="display:flex;align-items:center;gap:10px;margin:14px 0;font-size:12px;color:var(--muted);"><div style="flex:1;height:1px;background:rgba(154,128,112,.2);"></div><span>或加入已有房间</span><div style="flex:1;height:1px;background:rgba(154,128,112,.2);"></div></div>
      <input id="flipMpCode" type="text" placeholder="输入4位房间号" maxlength="4" inputmode="numeric" style="width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid rgba(154,128,112,.25);font-size:15px;font-family:inherit;background:#fff;outline:none;margin-bottom:10px;display:block;">
      <button onclick="flipMpJoin()" style="width:100%;padding:13px;border-radius:13px;border:1.5px solid rgba(154,128,112,.3);background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">加入房间</button>
      <p id="flipMpJErr" style="font-size:13px;color:#C0392B;min-height:18px;"></p>
    </div>
    <div id="flipMpLobby" style="display:none;">
      <div style="background:#fff;border-radius:18px;padding:20px;text-align:center;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);">
        <p style="font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:6px;">房间号</p>
        <p id="flipMpCodeD" style="font-family:'Noto Serif SC',serif;font-size:48px;font-weight:900;color:var(--accent);letter-spacing:.12em;">—</p>
        <p style="font-size:12px;color:var(--muted);margin-top:6px;">把号码告诉朋友</p>
      </div>
      <div style="background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:16px;"><p style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;">已加入 <span id="flipMpCnt">0</span> 人</p><div id="flipMpPlist"></div></div>
      <p style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:16px;">进入后，任意玩家点「这轮我来」成为玩家1</p>
      <button onclick="flipMpEnter()" style="width:100%;padding:15px;border-radius:13px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;">进入游戏 →</button>
    </div>
  </div>

  <script src="../shared/relationship-session.js"></script>
  <script>
    const FLIP_WS='wss://lightaitec.com/relationship/flip/ws';
    const FLIP_GAME_KEY='flip';
    const flipSession=window.RelationshipSession;
    let flipInMp=false,flipWs=null,flipMyId=null,flipMyName='',flipIsHost=false,flipMpIsSubject=false,flipState=null,flipIntentionalClose=false,flipRestoreRoomCode='',flipRestoreRetryCount=0;

    function openFlipMp(){document.getElementById('flipMpOverlay').style.display='block';}
    function closeFlipMp(){document.getElementById('flipMpOverlay').style.display='none';}
    function flipSend(m){if(flipWs&&flipWs.readyState===1)flipWs.send(JSON.stringify(m));}
    function flipConnect(onOpen){
      flipIntentionalClose=false;
      flipWs=new WebSocket(FLIP_WS);
      flipWs.onopen=()=>{if(onOpen)onOpen();};
      flipWs.onmessage=e=>flipMpMsg(JSON.parse(e.data));
      flipWs.onclose=()=>{
        if(!flipIntentionalClose&&flipState?.code){
          flipSession.showConnectionStatus('reconnecting','正在重新连接...');
          setTimeout(flipReconnect,2000);
        }
      };
      flipWs.onerror=()=>{};
    }
    function flipReconnect(){
      if(!flipState?.code||!flipMyName)return;
      flipConnect(()=>flipSend({type:'join_room',roomCode:flipState.code,...flipSession.identityPayload(flipMyName)}));
    }

    function flipMpConfirm(){
      const n=document.getElementById('flipMpName').value.trim();
      if(!n){document.getElementById('flipMpErr').textContent='请输入昵称';return;}
      flipMyName=flipSession.saveNickname(n).nickname;document.getElementById('flipMpErr').textContent='';
      document.getElementById('flipMpCN').textContent=n;
      document.getElementById('flipMpS1').style.display='none';
      document.getElementById('flipMpS2').style.display='block';
    }
    function flipMpCreate(){
      flipIsHost=true;
      flipConnect(()=>flipSend({type:'create_room',...flipSession.identityPayload(flipMyName)}));
    }
    function flipMpJoin(){
      const c=document.getElementById('flipMpCode').value.trim();
      if(!c||c.length!==4){document.getElementById('flipMpJErr').textContent='请输入4位房间号';return;}
      flipConnect(()=>flipSend({type:'join_room',roomCode:c,...flipSession.identityPayload(flipMyName)}));
    }
    function flipMpEnter(){
      flipInMp=true;
      closeFlipMp();
      // 联机模式：隐藏人数选择按钮，人数由房间自动决定
      const countBtns=document.querySelector('#countScreen .count-btns');
      if(countBtns) countBtns.style.display='none';
      const desc=document.querySelector('#countScreen > p');
      if(desc) desc.textContent='联机模式 · 任意玩家点下方按钮成为出题人';
      flipMpUpdateCtrl();
    }

    function flipMpMsg(msg){
      if(msg.type==='room_created'){flipMyId=msg.state.players[0].id;flipState=msg.state;flipRememberRoom();flipMpShowLobby(msg.state);}
      else if(msg.type==='joined'||msg.type==='rejoined'){flipMyId=msg.state.players.find(p=>p.name===flipMyName)?.id;flipState=msg.state;flipRememberRoom();flipSession.showConnectionStatus('restored','已回到房间');flipMpShowLobby(msg.state);}
      else if(msg.type==='player_joined'||msg.type==='player_back'||msg.type==='player_left'){flipState=msg.state;flipMpRender(msg.state);}
      else if(msg.type==='guess_subject_set'){
        flipMpIsSubject=msg.subjectName===flipMyName;flipMpUpdateCtrl(msg.subjectName);
      }
      else if(msg.type==='guess_round_start'){
        if(!flipMpIsSubject){
          currentCards=msg.roundData.cards;
          document.getElementById('countScreen').style.display='none';
          document.getElementById('gameScreen').style.display='block';
          document.getElementById('modeTag').textContent='联机猜测';
          const roomCount=flipState?.players?.length||2;
          selectArr=[]; currentPlayer=2; totalPlayer=roomCount;
          let html='';
          for(let i=0;i<5;i++) html+=`<div class="card" onclick="chooseCard(${i},this)"><p>${currentCards[i]}</p></div>`;
          document.getElementById('cardBox').innerHTML=html;
          document.getElementById('tip').innerText='出题人已就绪，猜猜TA选了哪2张';
          document.getElementById('sureBtn').disabled=true;
          document.getElementById('sureBtn').textContent='确认猜测';
          document.getElementById('nextBtn').style.display='none';
        }
      }
      else if(msg.type==='guess_others_turn'&&!flipMpIsSubject){
        document.getElementById('tip').innerText='猜猜玩家1选了哪2张描述自己';
      }
      else if(msg.type==='guess_player_ready'&&flipMpIsSubject){
        const sureBtn=document.getElementById('sureBtn');
        sureBtn.disabled=false;sureBtn.textContent=`${msg.readyCount}人猜好了 — 点击揭晓`;
        sureBtn.onclick=()=>flipSend({type:'guess_reveal'});
      }
      else if(msg.type==='guess_revealed'){
        const subSel=msg.subjectData||[];
        const guesses=Object.values(msg.guesses||{});
        document.getElementById('cardBox').style.pointerEvents='none';
        document.querySelectorAll('.card').forEach((el,i)=>{
          el.classList.remove('active');
          if(subSel.includes(i)) el.classList.add('revealed');
        });
        let resText=`<span style="color:var(--muted);font-size:14px">玩家1的选择：「${currentCards[subSel[0]]}」和「${currentCards[subSel[1]]}」</span><br/><br/>`;
        guesses.forEach(g=>{
          const ps=g.guess||[]; const matchCount=ps.filter(i=>subSel.includes(i)).length;
          if(matchCount===2) resText+=`✅ ${g.name}：全猜对了！<br/>`;
          else if(matchCount===1) resText+=`🌓 ${g.name}：猜中了一张「${currentCards[ps.find(i=>subSel.includes(i))]}」<br/>`;
          else resText+=`🤍 ${g.name}：这次没猜中<br/>`;
        });
        document.getElementById('result').innerHTML=resText;
        document.getElementById('nextBtn').style.display='inline-block';
        document.getElementById('nextBtn').onclick=flipPrepareNextRound;
      }
      else if(msg.type==='guess_reset'){
        flipMpIsSubject=false;
        selectArr=[];
        currentCards=[];
        allPlayerSelect=[];
        document.getElementById('result').innerHTML='';
        document.getElementById('cardBox').innerHTML='';
        document.getElementById('nextBtn').style.display='none';
        // P-3: 重置 sureBtn，防止下一轮此玩家变猜测者时点确认误发 reveal
        const sureBtn=document.getElementById('sureBtn');
        sureBtn.disabled=true;
        sureBtn.textContent='确认选择';
        sureBtn.onclick=sureSelect;
        // P-1: 回到等待屏，让大家能看到"这轮我来"按钮
        document.getElementById('gameScreen').style.display='none';
        document.getElementById('countScreen').style.display='block';
        flipMpUpdateCtrl();
      }
      else if(msg.type==='error'){flipSession.showConnectionStatus('failed',msg.message||'连接失败，请重试');if(flipRetryRestoreAfterNameCollision(msg.message))return;document.getElementById('flipMpJErr').textContent=msg.message;}
    }
    function flipRetryRestoreAfterNameCollision(message){
      if(!flipRestoreRoomCode||!flipSession.isRetryableRestoreError(message)||flipRestoreRetryCount>=5)return false;
      flipRestoreRetryCount+=1;
      flipSession.showConnectionStatus('reconnecting','Waiting for previous connection...');
      setTimeout(()=>{
        flipConnect(()=>flipSend({type:'join_room',roomCode:flipRestoreRoomCode,...flipSession.identityPayload(flipMyName)}));
      },900+flipRestoreRetryCount*500);
      return true;
    }
    function flipRememberRoom(){
      if(!flipState?.code||!flipMyId)return;
      flipRestoreRoomCode='';
      flipRestoreRetryCount=0;
      flipSession.saveRoom({
        gameKey:FLIP_GAME_KEY,
        roomCode:flipState.code,
        playerId:flipMyId,
        role:flipIsHost?'host':'player',
        state:'lobby',
      });
    }

    function flipMpShowLobby(state){
      document.getElementById('flipMpS2').style.display='none';
      document.getElementById('flipMpLobby').style.display='block';
      flipMpRender(state);
    }
    function flipMpRender(state){
      document.getElementById('flipMpCodeD').textContent=state.code;
      document.getElementById('flipMpCnt').textContent=state.players.length;
      const list=document.getElementById('flipMpPlist');list.innerHTML='';
      state.players.forEach((p,i)=>{
        const d=document.createElement('div');d.style.cssText='display:flex;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(154,128,112,.1);';
        d.innerHTML=`<span style="width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:9px;flex-shrink:0;display:inline-block;"></span><span>${p.name}${p.id===flipMyId?' (我)':''}</span><span style="margin-left:auto;font-size:11px;color:var(--muted);">${i===0?'主持人':''}</span>`;
        list.appendChild(d);
      });
    }
    function flipMpUpdateCtrl(subjectName){
      const ctrl=document.getElementById('flipMpCtrl');
      if(!flipInMp){ctrl.style.display='none';return;}
      document.getElementById('flipMpBtn').style.display='none';
      if(!subjectName){
        ctrl.innerHTML=`<button onclick="flipMpVolunteer()" style="width:100%;padding:13px;border-radius:13px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">这轮我来出题！</button>`;
        ctrl.style.display='block';
      } else if(flipMpIsSubject){
        ctrl.innerHTML=`<p style="font-size:13px;background:rgba(93,143,114,.1);padding:10px 16px;border-radius:10px;color:var(--accent);font-weight:700;">✅ 你是本轮出题人，请选 2 张描述自己的卡牌</p>`;
        ctrl.style.display='block';
      } else {
        ctrl.innerHTML=`<p style="font-size:13px;background:rgba(244,248,245,.8);padding:10px 16px;border-radius:10px;color:var(--muted);">${subjectName} 正在出题，选好后你来猜…</p>`;
        ctrl.style.display='block';
      }
    }
    function flipPrepareNextRound(){
      flipSend({type:'guess_next_round'});
      flipMpIsSubject=false;
      selectArr=[];
      currentCards=[];
      document.getElementById('result').innerHTML='';
      document.getElementById('cardBox').innerHTML='';
      document.getElementById('nextBtn').style.display='none';
      document.getElementById('sureBtn').disabled=true;
      document.getElementById('sureBtn').textContent='确认选择';
      document.getElementById('gameScreen').style.display='none';
      document.getElementById('countScreen').style.display='block';
      flipMpUpdateCtrl();
    }
    function flipRestoreName(){
      const savedName=flipSession.applyNicknameToInput('flipMpName');
      if(!savedName)return '';
      flipMyName=savedName;
      document.getElementById('flipMpCN').textContent=flipMyName;
      document.getElementById('flipMpS1').style.display='none';
      document.getElementById('flipMpS2').style.display='block';
      return savedName;
    }
    function flipRestoreSessionOnLoad(){
      const savedName=flipRestoreName();
      const savedRoom=flipSession.getRoom(FLIP_GAME_KEY);
      if(!savedName||!savedRoom)return;
      openFlipMp();
      flipRestoreRoomCode=savedRoom.roomCode;
      flipRestoreRetryCount=0;
      flipSession.showConnectionStatus('reconnecting',`正在回到 ${savedRoom.roomCode} 房间...`);
      flipConnect(()=>flipSend({type:'join_room',roomCode:savedRoom.roomCode,...flipSession.identityPayload(flipMyName)}));
    }
    flipRestoreSessionOnLoad();
    function flipMpVolunteer(){
      flipMpIsSubject=true;
      flipSend({type:'guess_volunteer'});
      // 使用实际房间人数，不写死2人
      const count=flipState?.players?.length||2;
      startWithCount(count);
    }
  </script>
</body>
